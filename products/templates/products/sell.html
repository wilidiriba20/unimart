{% extends 'base.html' %} {% load static %} {% block main %}

<div class="container my-5">
  <div class="max-w-850 mx-auto" style="max-width: 850px">
    <!-- Back button to Browse -->
    <div class="d-flex justify-content-end mb-3">
      <a href="{% url 'index' %}" class="btn btn-dark">
        <i class="fas fa-arrow-left me-1"></i> Back to Browse
      </a>
    </div>

    <div class="card form-card p-4 p-md-5 bg-white">
      <h2 class="fw-bold mb-5">Add New Product</h2>

      <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-4">
          <label class="form-label">Product Title *</label>
          <input
            type="text"
            name="title"
            class="form-control"
            placeholder="e.g., Calculus Textbook - 10th Edition"
          />
        </div>

        <div class="row">
          <div class="col-md-6 mb-4">
            <label class="form-label">Price (birr) *</label>
            <input
              type="number"
              name="price"
              class="form-control"
              placeholder="300"
            />
          </div>
          <div class="col-md-6 mb-4">
            <label class="form-label">Location *</label>
            <input
              type="text"
              name="location"
              class="form-control"
              placeholder="Addis Ababa"
            />
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-4">
            <label class="form-label">Category *</label>
            <select class="form-select" name="category" required>
              <option disabled selected>Select category</option>
              <option value="clothing">Clothing</option>
              <option value="electronics">Electronics</option>
              <option value="books learning">Books & Learning</option>
              <option value="food">Food</option>
              <option value="beauty health">Beauty & Health</option>
            </select>
          </div>
          <div class="col-md-6 mb-4">
            <label class="form-label">Condition *</label>
            <select class="form-select" name="condition" required>
              <option disabled selected>Select condition</option>
              <option value="new">New</option>
              <option value="like_new">Like New</option>
              <option value="good">Good</option>
              <option value="fair">Fair</option>
              <option value="used">Used</option>
            </select>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label">Description *</label>
          <textarea
            class="form-control"
            name="description"
            rows="4"
            placeholder="Describe your product in detail..."
          ></textarea>
        </div>

        <div class="mb-5">
          <label class="form-label">Image *</label>
          <input type="file" name="image" class="form-control" />
        </div>

        <!-- Buttons centered -->
        <div class="d-flex justify-content-center gap-3">
          <button type="submit" name="add_product" class="btn btn-primary px-4">
            Add
          </button>

          <button type="submit" name="add_another" class="btn btn-primary px-4">
            Add+1
          </button>

          <button type="button" class="btn btn-secondary px-4" id="clearForm">
            Clear
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
  // Clear button functionality
  const form = document.querySelector("form");
  const clearBtn = document.getElementById("clearForm");

  clearBtn.addEventListener("click", () => {
    form.querySelectorAll("input, textarea, select").forEach((input) => {
      if (
        input.type === "text" ||
        input.type === "number" ||
        input.tagName === "TEXTAREA"
      ) {
        input.value = "";
      } else if (input.tagName === "SELECT") {
        input.selectedIndex = 0;
      } else if (input.type === "file") {
        input.value = "";
      }
    });
  });
</script>

{% endblock %}
