{% extends 'base.html' %} {% load static %} {% block main %}

<div class="container my-5">
  <div class="max-w-850 mx-auto" style="max-width: 850px">
    <!-- Back button to Browse -->
    <div class="d-flex justify-content-end mb-3">
      <a href="{% url 'products:index' %}" class="btn btn-dark">
        <i class="fas fa-arrow-left me-1"></i> Back to Browse
      </a>
    </div>

    <div class="card form-card p-4 p-md-5 bg-white">
      <h2 class="fw-bold mb-5">
        {% if product %}Edit Product{% else %}Add New Product{% endif %}
      </h2>

      <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <!-- Product Title -->
        <div class="mb-4">
          <label class="form-label">Product Title *</label>
          <input
            type="text"
            name="title"
            class="form-control"
            placeholder="e.g., Calculus Textbook - 10th Edition"
            value="{{ product.title|default:'' }}"
            required
          />
        </div>

        <!-- Price & Location -->
        <div class="row">
          <div class="col-md-6 mb-4">
            <label class="form-label">Price (birr) *</label>
            <input
              type="number"
              name="price"
              class="form-control"
              placeholder="300"
              value="{{ product.price|default:'' }}"
              required
            />
          </div>
          <div class="col-md-6 mb-4">
            <label class="form-label">Location *</label>
            <input
              type="text"
              name="location"
              class="form-control"
              placeholder="Addis Ababa"
              value="{{ product.location|default:'' }}"
              required
            />
          </div>
        </div>

        <!-- Category & Condition -->
        <div class="row">
          <div class="col-md-6 mb-4">
            <label class="form-label">Category *</label>
            <select class="form-select" name="category" required>
              <option disabled {% if not product %}selected{% endif %}>
                Select category
              </option>
              <option
                value="clothing"
                {%
                if
                product.category=""
                ="clothing"
                %}selected{%
                endif
                %}
              >
                Clothing
              </option>
              <option
                value="electronics"
                {%
                if
                product.category=""
                ="electronics"
                %}selected{%
                endif
                %}
              >
                Electronics
              </option>
              <option
                value="books learning"
                {%
                if
                product.category=""
                ="books learning"
                %}selected{%
                endif
                %}
              >
                Books & Learning
              </option>
              <option
                value="food"
                {%
                if
                product.category=""
                ="food"
                %}selected{%
                endif
                %}
              >
                Food
              </option>
              <option
                value="beauty health"
                {%
                if
                product.category=""
                ="beauty health"
                %}selected{%
                endif
                %}
              >
                Beauty & Health
              </option>
            </select>
          </div>
          <div class="col-md-6 mb-4">
            <label class="form-label">Condition *</label>
            <select class="form-select" name="condition" required>
              <option disabled {% if not product %}selected{% endif %}>
                Select condition
              </option>
              <option
                value="new"
                {%
                if
                product.condition=""
                ="new"
                %}selected{%
                endif
                %}
              >
                New
              </option>
              <option
                value="like_new"
                {%
                if
                product.condition=""
                ="like_new"
                %}selected{%
                endif
                %}
              >
                Like New
              </option>
              <option
                value="good"
                {%
                if
                product.condition=""
                ="good"
                %}selected{%
                endif
                %}
              >
                Good
              </option>
              <option
                value="fair"
                {%
                if
                product.condition=""
                ="fair"
                %}selected{%
                endif
                %}
              >
                Fair
              </option>
              <option
                value="used"
                {%
                if
                product.condition=""
                ="used"
                %}selected{%
                endif
                %}
              >
                Used
              </option>
            </select>
          </div>
        </div>

        <!-- Description -->
        <div class="mb-4">
          <label class="form-label">Description *</label>
          <textarea
            class="form-control"
            name="description"
            rows="4"
            placeholder="Describe your product in detail..."
            required
          >
{{ product.description|default:'' }}</textarea
          >
        </div>

        <!-- Image -->
        <div class="mb-5">
          <label class="form-label"
            >Image {% if not product %}*{% endif %}</label
          >
          <input type="file" name="image" class="form-control" />
          {% if product and product.image %}
          <small class="text-muted"
            >Current image:
            <a href="{{ product.image.url }}" target="_blank">View</a></small
          >
          {% endif %}
        </div>

        <!-- Buttons centered -->
        <div class="d-flex justify-content-center gap-3">
          <button type="submit" name="add_product" class="btn btn-primary px-4">
            {% if product %}Update{% else %}Add{% endif %}
          </button>

          <button type="submit" name="add_another" class="btn btn-primary px-4">
            {% if not product %}Add+1{% endif %}
          </button>

          <button type="button" class="btn btn-secondary px-4" id="clearForm">
            Clear
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
  // Clear button functionality
  const form = document.querySelector("form");
  const clearBtn = document.getElementById("clearForm");

  clearBtn.addEventListener("click", () => {
    form.querySelectorAll("input, textarea, select").forEach((input) => {
      if (
        input.type === "text" ||
        input.type === "number" ||
        input.tagName === "TEXTAREA"
      ) {
        input.value = "";
      } else if (input.tagName === "SELECT") {
        input.selectedIndex = 0;
      } else if (input.type === "file") {
        input.value = "";
      }
    });
  });
</script>

{% endblock %}
