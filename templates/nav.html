{% if user.is_authenticated %}

<!-- ================= LOGGED IN NAVBAR ================= -->

<nav
  class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top py-3"
>
  <div class="container">
    <!-- Logo -->
    <a
      class="navbar-brand d-flex align-items-center fw-bold fs-3"
      href="{% url 'index' %}"
    >
      <i
        class="fas fa-shopping-bag me-2 p-2 bg-primary text-white rounded shadow-sm"
      ></i
      >UniMarket
    </a>

    <!-- Mobile Menu Button -->
    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarContent"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Navbar Content -->
    <div class="collapse navbar-collapse" id="navbarContent">
      <!-- Search Bar -->
      <div class="flex-grow-1 mx-lg-5 my-3 my-lg-0">
        <div class="search-container w-100">
          <form method="GET" action="{% url 'index' %}" class="w-100">
            <input
              type="text"
              name="q"
              class="form-control"
              placeholder="Search for products..."
              value="{{ request.GET.q|default:'' }}"
            />
          </form>
        </div>
      </div>

      <!-- Buttons -->
      <div class="d-flex flex-column flex-lg-row gap-2">
        <a href="{%url 'sell'%}" class="btn btn-outline-secondary">
          + Sell Item
        </a>

        <a href="#" class="btn btn-outline-secondary">
          <i class="fa-solid fa-user"></i> Dashboard
        </a>

        <a href="{% url 'logout' %}" class="btn btn-outline-danger"> Logout </a>
      </div>
    </div>
  </div>
</nav>

{% else %}

<!-- ================= NOT LOGGED IN NAVBAR ================= -->

<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom py-3">
  <div class="container">
    <!-- Logo -->
    <a
      class="navbar-brand d-flex align-items-center fw-bold fs-3"
      href="{% url 'index' %}"
    >
      <i
        class="fas fa-shopping-bag me-2 p-2 bg-primary text-white rounded shadow-sm"
      ></i
      >UniMarket
    </a>

    <!-- Mobile Menu Button -->
    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarContent"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Navbar Content -->
    <div class="collapse navbar-collapse" id="navbarContent">
      <!-- Search Bar -->
      <div class="flex-grow-1 mx-lg-5 my-3 my-lg-0">
        <div class="search-container w-100">
          <form method="GET" action="{% url 'index' %}" class="w-100">
            <input
              type="text"
              name="q"
              class="form-control"
              placeholder="Search for products..."
              value="{{ request.GET.q|default:'' }}"
            />
          </form>
        </div>
      </div>

      <!-- Buttons -->
      <div class="d-flex flex-column flex-lg-row gap-2">
        <a href="{% url 'login' %}" class="btn btn-outline-secondary">
          Login
        </a>

        <a href="{% url 'register' %}" class="btn btn-dark"> Register </a>
      </div>
    </div>
  </div>
</nav>

{% endif %}
